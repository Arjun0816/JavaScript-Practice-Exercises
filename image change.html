<!DOCTYPE html>
<html>

<body>

    <img
    id="image"
    src="https://via.placeholder.com/150">

    <br><br>

    <button onclick="changeImage()">
        Change Image
    </button>

    <script>

        function changeImage()
        {
            document.getElementById("image").src =
            "https://via.placeholder.com/300";
        }

    </script>

</body>

</html>
