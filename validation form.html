<!DOCTYPE html>
<html>

<body>

    <input type="text" id="username">

    <button onclick="validateForm()">
        Submit
    </button>

    <script>

        function validateForm()
        {
            let username =
            document.getElementById("username").value;

            if(username == "")
            {
                alert("Username required");
            }

            else
            {
                alert("Form Submitted");
            }
        }

    </script>

</body>

</html>
