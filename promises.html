<!DOCTYPE html>
<html>

<body>

    <script>

        let promise =
        new Promise((resolve, reject) =>
        {
            let success = true;

            if(success)
            {
                resolve("Login Success");
            }

            else
            {
                reject("Login Failed");
            }
        });

        promise.then((message) =>
        {
            console.log(message);
        });

    </script>

</body>

</html>
