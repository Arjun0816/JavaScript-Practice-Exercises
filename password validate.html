<!DOCTYPE html>
<html>

<body>

    <input type="password" id="password">

    <button onclick="checkPassword()">
        Submit
    </button>

    <script>

        function checkPassword()
        {
            let password =
            document.getElementById("password").value;

            if(password.length < 6)
            {
                alert("Password too short");
            }

            else
            {
                alert("Strong Password");
            }
        }

    </script>

</body>

</html>
